services:
  llm-exporter:
    image: ghcr.io/strategic-zone/llm-exporter:latest
    # build: .   # uncomment to build locally
    container_name: llm-exporter
    hostname: llm-exporter
    restart: unless-stopped
    ports:
      - "${METRICS_PORT:-9090}:9090"
    environment:
      - METRICS_PORT=${METRICS_PORT:-9090}
      - SCRAPE_INTERVAL=${SCRAPE_INTERVAL:-300}
      - CONFIG_FILE=/app/config.yaml
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - config:/app/config.yaml
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - monitoring

  # Optional: VictoriaMetrics (lightweight Prometheus-compatible TSDB)
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoriametrics
    hostname: victoriametrics
    restart: unless-stopped
    ports:
      - "8428:8428"
    volumes:
      - vm-data:/victoria-metrics-data
      - vm-config:/etc/victoriametrics/scrape.yml
    command:
      - "--promscrape.config=/etc/victoriametrics/scrape.yml"
      - "--retentionPeriod=90d"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - monitoring
    profiles:
      - full  # only starts with: docker compose --profile full up

  # Optional: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    hostname: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - grafana-provisioning:/etc/grafana/provisioning
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - monitoring
    profiles:
      - full

networks:
  monitoring:
    driver: bridge

volumes:
  config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/config.yaml
  vm-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-/opt/llm-exporter}/victoriametrics
  vm-config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/victoriametrics.yml
  grafana-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-/opt/llm-exporter}/grafana
  grafana-provisioning:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/grafana/provisioning
